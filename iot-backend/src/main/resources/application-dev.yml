# 本地开发环境 - 无需外部数据库
# 启动方式: java -jar iot-platform.jar --spring.profiles.active=dev

spring:
  datasource:
    url: jdbc:h2:mem:iotdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: never  # H2 用 JPA ddl-auto 建表，不执行 PostgreSQL 语法的 data.sql

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  kafka:
    enabled: false
  tdengine:
    enabled: false
