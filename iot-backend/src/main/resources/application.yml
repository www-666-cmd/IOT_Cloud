server:
  port: 8080

spring:
  # PostgreSQL (主库 - 设备/用户/告警/业务数据)
  datasource:
    url: jdbc:postgresql://localhost:5432/iotdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

  # Redis 配置 - 实时状态缓存、告警防抖
  data:
    redis:
      host: localhost
      port: 6379
      password:
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 5
      timeout: 5000ms

  # Kafka 配置 - 高并发数据缓冲
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      compression-type: snappy
      batch-size: 16384
      linger-ms: 5
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: iot-platform
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 500
    listener:
      ack-mode: manual

# Actuator 健康检查 (K8s 探针)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: false
  health:
    redis:
      enabled: false

app:
  jwt:
    secret: "12345678901234567890123456789012"
    expiration-ms: 86400000
  kafka:
    enabled: true
    topics:
      device-raw: device.raw.v1
      device-telemetry: device.telemetry.v1
      device-status: device.status.v1
      alert-events: alert.events.v1
  mqtt:
    enabled: true
    broker-url: tcp://172.21.180.214:1883   # EMQX 默认 MQTT 端口
    ws-url: ws://localhost:8083/mqtt    # EMQX WebSocket 端口（前端直连用）
    client-id: iot-platform-server
    topics:
      telemetry: iot/+/telemetry  # 控制传感器设备数据上报
      status: iot/+/status        #
      command: iot/+/command
  redis: # 数据缓存
    enabled: true
    device-online-ttl: 120
    alert-debounce-prefix: "alert:debounce:"
  tdengine:   # TDengine 时序数据库配置
    enabled: true  # 开发环境默认关闭，生产开启
    url: jdbc:TAOS://172.21.180.214:6030/iot_telemetry
    username: root
    password: taosdata
    max-pool-size: 10
    batch-size: 1000         # 批量写入行数
    batch-interval-ms: 5000  # 批量写入间隔ms
